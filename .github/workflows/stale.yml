name: Stale Issue and PR Management

on:
  schedule:
    # Daily at 01:00 UTC
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark and Close Stale Items
    runs-on: ubuntu-latest

    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # Issues
          days-before-issue-stale: 60
          days-before-issue-close: 14
          stale-issue-label: stale
          stale-issue-message: >
            This issue has been inactive for 60 days and has been marked as stale.
            If this is still relevant, please leave a comment to keep it open.
            It will be closed automatically in 14 days if there is no activity.
          close-issue-message: >
            This issue has been closed due to inactivity. Feel free to reopen if
            the problem persists or you have additional information.

          # Pull Requests
          days-before-pr-stale: 30
          days-before-pr-close: 10
          stale-pr-label: stale
          stale-pr-message: >
            This pull request has been inactive for 30 days and has been marked as stale.
            Please rebase, update, or comment to keep it open.
          close-pr-message: >
            This pull request has been closed due to inactivity. Please reopen if
            you would like to continue this work.

          # Never auto-close items with these labels
          exempt-issue-labels: >
            pinned,
            security,
            bug,
            critical,
            needs-triage
          exempt-pr-labels: >
            pinned,
            security,
            do-not-close
