name: Configure Branch Protection

# Run manually by a repository administrator to apply (or re-apply) the
# agreed branch-protection ruleset to `main`.  Uses the built-in GITHUB_TOKEN
# with administration:write permission — no PAT required, provided the
# repository's "Actions" settings grant the token write access.
#
# Re-run this workflow any time you need to reset the rules, e.g. after an
# accidental UI change.

on:
  workflow_dispatch:

permissions:
  # Required to create/update branch protection rules via the REST API.
  administration: write
  # Minimum needed for checkout (not strictly required but good practice).
  contents: read

jobs:
  configure:
    name: Configure Branch Protection
    runs-on: ubuntu-latest

    steps:
      - name: Apply branch protection rules to main
        # Status-check names must exactly match the `name:` field of each
        # workflow job that produces them:
        #   "Lint"             — ci.yml        job: lint         (name: Lint)
        #   "Type Check"       — ci.yml        job: typecheck    (name: Type Check)
        #   "Test (Node 20)"   — ci.yml        job: test / matrix node 20 (name: Test (Node ${{ matrix.node }}))
        #   "Test (Node 22)"   — ci.yml        job: test / matrix node 22 (name: Test (Node ${{ matrix.node }}))
        #   "Build"            — ci.yml        job: build        (name: Build)
        #   "CodeQL Analysis"  — codeql.yml    job: analyze      (name: CodeQL Analysis)
        #   "Dependency Review"— dependency-review.yml  job: dependency-review  (name: Dependency Review)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/${{ github.repository }}/branches/main/protection \
            --input - <<'EOF'
          {
            "required_status_checks": {
              "strict": true,
              "contexts": [
                "Lint",
                "Type Check",
                "Test (Node 20)",
                "Test (Node 22)",
                "Build",
                "CodeQL Analysis",
                "Dependency Review"
              ]
            },
            "enforce_admins": true,
            "required_pull_request_reviews": {
              "dismiss_stale_reviews": true,
              "require_code_owner_reviews": false,
              "required_approving_review_count": 1
            },
            "restrictions": null,
            "allow_force_pushes": false,
            "allow_deletions": false,
            "required_linear_history": false,
            "required_conversation_resolution": false
          }
          EOF

      - name: Verify applied rules
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== Branch protection rules for main ==="
          gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/${{ github.repository }}/branches/main/protection \
            | jq '{
                required_status_checks: .required_status_checks.contexts,
                enforce_admins: .enforce_admins.enabled,
                required_approving_reviews: .required_pull_request_reviews.required_approving_review_count,
                dismiss_stale_reviews: .required_pull_request_reviews.dismiss_stale_reviews,
                allow_force_pushes: .allow_force_pushes.enabled,
                allow_deletions: .allow_deletions.enabled
              }'
