name: Deploy Preview

on:
  pull_request:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/deploy-preview.yml'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    name: Deploy frontend preview
    runs-on: ubuntu-latest
    if: hashFiles('web/package.json') != '' && secrets.VERCEL_TOKEN != '' && secrets.VERCEL_ORG_ID != '' && secrets.VERCEL_PROJECT_ID != ''
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: web

      - name: Deploy to Vercel preview
        id: deploy
        working-directory: web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npx vercel pull --yes --environment=preview --token "$VERCEL_TOKEN"
          DEPLOY_OUTPUT="$(npx vercel deploy --yes --token "$VERCEL_TOKEN")"
          DEPLOY_URL="$(echo "$DEPLOY_OUTPUT" | tail -n 1)"
          case "$DEPLOY_URL" in
            http*) ;;
            *) DEPLOY_URL="https://$DEPLOY_URL" ;;
          esac
          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.url }}
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ Frontend preview deployed: ${process.env.PREVIEW_URL}`
            });
