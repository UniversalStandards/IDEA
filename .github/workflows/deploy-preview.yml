name: Deploy Preview

on:
  pull_request:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/deploy-preview.yml'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    name: Deploy frontend preview
    runs-on: ubuntu-latest
    if: hashFiles('web/package.json') != '' && github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: web

      - name: Check preview deploy configuration
        id: deploy-config
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Vercel secrets are not configured; skipping preview deployment."
          fi

      - name: Deploy to Vercel preview
        id: deploy
        if: steps.deploy-config.outputs.enabled == 'true'
        working-directory: web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npx vercel pull --yes --environment=preview --token "$VERCEL_TOKEN"
          DEPLOY_OUTPUT="$(npx vercel deploy --yes --token "$VERCEL_TOKEN")"
          DEPLOY_URL="$(echo "$DEPLOY_OUTPUT" | tail -n 1)"
          if [ -z "$DEPLOY_URL" ]; then
            echo "Failed to determine preview deployment URL." >&2
            exit 1
          fi
          case "$DEPLOY_URL" in
            http*) ;;
            *.vercel.app) DEPLOY_URL="https://$DEPLOY_URL" ;;
            *)
              echo "Unexpected preview deployment URL output: $DEPLOY_URL" >&2
              exit 1
              ;;
          esac
          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL
        if: steps.deploy-config.outputs.enabled == 'true'
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.url }}
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ Frontend preview deployed: ${process.env.PREVIEW_URL}`
            });
