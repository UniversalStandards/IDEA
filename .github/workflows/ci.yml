name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run test:ci
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-that-is-32-characters-long!!
          ENCRYPTION_KEY: test-encryption-key-32-characters!!
      - name: Upload coverage
        if: matrix.node == '20'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Verify dist output
        run: test -f dist/index.js || (echo "dist/index.js missing" && exit 1)

  frontend-typecheck:
    name: Frontend Type Check
    runs-on: ubuntu-latest
    if: hashFiles('web/package.json') != ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
        working-directory: web
      - name: Run frontend typecheck
        run: npx tsc --noEmit
        working-directory: web

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    if: hashFiles('web/package.json') != ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
        working-directory: web
      - name: Run frontend lint
        run: npm run lint
        working-directory: web

  frontend-test:
    name: Frontend Test
    runs-on: ubuntu-latest
    if: hashFiles('web/package.json') != ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
        working-directory: web
      - name: Run frontend tests
        run: npm run test
        working-directory: web

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    if: hashFiles('web/package.json') != ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
        working-directory: web
      - name: Build frontend
        run: npm run build
        working-directory: web
      - name: Upload frontend build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-next-build
          path: web/.next/
          retention-days: 7

  frontend-e2e:
    name: Frontend E2E
    runs-on: ubuntu-latest
    needs: [frontend-build, build]
    if: github.event_name == 'pull_request' && github.base_ref == 'main' && hashFiles('web/package.json') != ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci
        working-directory: web

      - name: Build frontend for E2E
        run: npm run build
        working-directory: web

      - name: Install Playwright browsers
        run: npx playwright install --with-deps
        working-directory: web

      - name: Start backend
        run: npm run dev > /tmp/backend.log 2>&1 & echo $! > /tmp/backend.pid

      - name: Start frontend
        run: npm run start -- --port 3000 > /tmp/frontend.log 2>&1 & echo $! > /tmp/frontend.pid
        working-directory: web

      - name: Wait for services
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:3000 >/dev/null && curl -fsS http://localhost:8080/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Services did not become ready" >&2
          exit 1

      - name: Run frontend E2E tests
        run: npx playwright test
        working-directory: web

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-playwright-report
          path: web/playwright-report/
          if-no-files-found: ignore
          retention-days: 7
