name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Block PRs that introduce high or critical severity vulnerabilities
          fail-on-severity: high

          # Block copyleft licenses that conflict with Apache-2.0
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0, LGPL-2.0, LGPL-2.1

          # Post a summary comment on the PR
          comment-summary-in-pr: always

          # Warn (but don't fail) on these scopes
          warn-only: false
