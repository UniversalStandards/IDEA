name: Deploy Production

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy-frontend:
    name: Deploy frontend to Vercel
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' && hashFiles('web/package.json') != ''
    outputs:
      frontend_url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: web

      - name: Check frontend deploy configuration
        id: frontend-config
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Skipping frontend deployment: Vercel secrets are not fully configured."
          fi

      - name: Deploy to Vercel production
        id: deploy
        if: steps.frontend-config.outputs.enabled == 'true'
        working-directory: web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npx vercel pull --yes --environment=production --token "$VERCEL_TOKEN"
          npx vercel build --prod --token "$VERCEL_TOKEN"
          DEPLOY_OUTPUT="$(npx vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN")"
          DEPLOY_URL="$(echo "$DEPLOY_OUTPUT" | tail -n 1)"
          if [ -z "$DEPLOY_URL" ]; then
            echo "Failed to determine production deployment URL." >&2
            exit 1
          fi
          case "$DEPLOY_URL" in
            http*) ;;
            *.vercel.app) DEPLOY_URL="https://$DEPLOY_URL" ;;
            *)
              echo "Unexpected production deployment URL output: $DEPLOY_URL" >&2
              exit 1
              ;;
          esac
          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"

  deploy-backend:
    name: Deploy backend
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    outputs:
      backend_url: ${{ steps.backend-url.outputs.url }}
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install backend dependencies
        run: npm ci

      - name: Build backend
        run: npm run build

      - name: Check backend deploy configuration
        id: backend-config
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_ENVIRONMENT: ${{ secrets.RAILWAY_ENVIRONMENT }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        run: |
          if [ -n "$FLY_API_TOKEN" ] && [ -f "fly.toml" ] && [ -n "$DATABASE_URL" ] && [ -n "$JWT_SECRET" ] && [ -n "$ENCRYPTION_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "provider=fly" >> "$GITHUB_OUTPUT"
          elif [ -n "$RAILWAY_TOKEN" ] && [ -n "$RAILWAY_PROJECT_ID" ] && [ -n "$DATABASE_URL" ] && [ -n "$JWT_SECRET" ] && [ -n "$ENCRYPTION_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "provider=railway" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "provider=none" >> "$GITHUB_OUTPUT"
            echo "Skipping backend deployment: configure Fly.io (FLY_API_TOKEN + fly.toml) or Railway (RAILWAY_TOKEN + RAILWAY_PROJECT_ID) with backend secrets."
          fi

      - name: Set up Fly.io CLI
        if: steps.backend-config.outputs.provider == 'fly'
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy backend to Fly.io
        if: steps.backend-config.outputs.provider == 'fly'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only

      - name: Install Railway CLI
        if: steps.backend-config.outputs.provider == 'railway'
        run: npm install -g @railway/cli

      - name: Deploy backend to Railway
        if: steps.backend-config.outputs.provider == 'railway'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_ENVIRONMENT: ${{ secrets.RAILWAY_ENVIRONMENT }}
        run: railway up --detach

      - name: Set backend URL output
        id: backend-url
        run: |
          if [ -n "${{ secrets.PRODUCTION_BACKEND_URL }}" ]; then
            echo "url=${{ secrets.PRODUCTION_BACKEND_URL }}" >> "$GITHUB_OUTPUT"
          else
            echo "url=" >> "$GITHUB_OUTPUT"
          fi

  smoke-test:
    name: Production smoke tests
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    if: always()
    steps:
      - name: Verify frontend deployment
        if: ${{ needs.deploy-frontend.result == 'success' && needs.deploy-frontend.outputs.frontend_url != '' }}
        run: curl -fsS "${{ needs.deploy-frontend.outputs.frontend_url }}"

      - name: Verify backend deployment
        if: ${{ needs.deploy-backend.result == 'success' && needs.deploy-backend.outputs.backend_url != '' }}
        run: curl -fsS "${{ needs.deploy-backend.outputs.backend_url }}/health"
