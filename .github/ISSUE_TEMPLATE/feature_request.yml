name: Feature Request
description: Suggest a new capability or improvement
title: "[Feature]: "
labels: [enhancement, needs-triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      options:
        - Discovery
        - Provisioning
        - Routing
        - Policy & Trust
        - Security
        - Orchestration
        - Observability
        - Adapters
        - API
        - Configuration
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options: [Nice to have, Important, Critical / Blocking]
    validations:
      required: true
