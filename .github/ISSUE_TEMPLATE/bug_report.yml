name: Bug Report
description: Report a defect or unexpected behavior
title: "[Bug]: "
labels: [bug, needs-triage]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Hub Version
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js Version
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options: [Linux, macOS, Windows, Docker, Other]
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      render: shell
